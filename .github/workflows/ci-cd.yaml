name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: payment-api
  EKS_CLUSTER: payment-api-eks
  K8S_NAMESPACE: payment-api

jobs:
  # ─── CI: build, scan, push ────────────────────────────────
  ci:
    name: Build & Scan
    runs-on: ubuntu-latest

    # Tylko na push do main lub PR
    permissions:
      id-token: write   # wymagane dla OIDC
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          # Tag = short commit SHA — unikalny, traceability
          echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            ./app

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          format: table
          exit-code: 1          # blokuje pipeline przy CRITICAL CVE
          severity: CRITICAL
          ignore-unfixed: true  # ignoruje CVE bez dostępnego fixa

      - name: Push image to ECR
        # Push dopiero PO skanowaniu — obraz nie trafia do ECR jeśli jest CRITICAL
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ─── CD: deploy — tylko na push do main, nie na PR ────────
  cd:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: ci

    # Nie deployuj na PR — tylko na merge do main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Deploy to EKS
        run: |
          # Podmień placeholder na rzeczywisty ECR URL z tagiem
          IMAGE="${{ needs.ci.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.ci.outputs.image-tag }}"

          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/deployment.yaml

          kubectl apply -f k8s/

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/payment-api \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=300s